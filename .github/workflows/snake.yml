name: Generate Snake Animation

on:
  schedule:
    # Run daily at midnight UTC
    - cron: '0 0 * * *'
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Generate Snake Animation
        uses: Platane/snk@v3
        with:
          github_user_name: YangGuanyuhan
          outputs: |
            dist/github-contribution-grid-snake-dark.svg?color_snake=green&color_dots=#0d1117,#58a6ff,#bc8cff,#ec4899,#f97316
            dist/github-contribution-grid-snake.svg?color_snake=green

      - name: Deploy to GitHub Pages
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
